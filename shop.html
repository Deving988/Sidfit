<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Collection | SIDFIT</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Firebase SDK Compat Core -->
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

    <!-- Sticky Header Wrapper -->
    <header class="main-header" id="globalHeader"></header>

    <main class="shop-viewport" style="margin-top: 90px; padding: 0 4%;">
        <!-- Search & Control Header -->
        <section class="catalog-controls">
            <div class="search-bar-wrapper">
                <input type="text" id="catalogSearch" placeholder="Search curated collections..." oninput="handleSearch(event)">
            </div>
            <div class="filter-actions-row">
                <button class="btn-filter-toggle" onclick="toggleFilterPanel()">Filter & Sort</button>
                <select id="catalogSort" onchange="handleSort(event)">
                    <option value="newest">Newest First</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
        </section>

        <!-- Layout Core Split -->
        <div class="catalog-layout-wrapper">
            <!-- Sidebar Filter Panel -->
            <aside class="filter-sidebar" id="filterSidebar">
                <div class="filter-group">
                    <h4>Categories</h4>
                    <ul class="filter-list">
                        <li><a href="#" class="cat-link active" onclick="filterByCategory('all')">All Garments</a></li>
                        <li><a href="#" class="cat-link" onclick="filterByCategory('Outerwear')">Outerwear</a></li>
                        <li><a href="#" class="cat-link" onclick="filterByCategory('Tops')">Tops</a></li>
                        <li><a href="#" class="cat-link" onclick="filterByCategory('Bottoms')">Bottoms</a></li>
                    </ul>
                </div>
                <div class="filter-group">
                    <h4>Size Availability</h4>
                    <div class="size-filter-grid">
                        <button onclick="filterBySize('S')">S</button>
                        <button onclick="filterBySize('M')">M</button>
                        <button onclick="filterBySize('L')">L</button>
                        <button onclick="filterBySize('XL')">XL</button>
                    </div>
                </div>
            </aside>

            <!-- Dynamic Product Matrix -->
            <section class="catalog-display-pane">
                <div class="products-grid" id="catalogGridContainer">
                    <!-- Loaded dynamically via shop.js pipeline -->
                </div>
            </section>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
